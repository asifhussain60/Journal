name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # Config lives in the repo so changes to versioning / changelog
          # sections are reviewable in PRs.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
